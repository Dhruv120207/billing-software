<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IDS Billing Software</title>
    <link rel="stylesheet" href="dashboard.css">
</head>
<body>

    <!-- HEADER -->
    <header class="header">

        <div class="left-section">
            <div class="logo-box">
                <!-- Replace logo.png with your company logo -->
                <img src="logo.png" alt="Company Logo" id="companyLogo">
            </div>

            <div class="company-details">
                <h1>ISHA DESIGNER STUDIO</h1>
                <p>IDS Billing Software</p>
            </div>
        </div>

        <div class="right-section">
            <div id="dateTime"></div>

            <button class="logout-btn" onclick="logout()">
                Logout
            </button>
        </div>

    </header>


    <!-- MENU BAR -->

    <nav class="menu-bar">

        <button>Master Setup</button>

        <button>Transaction</button>

        <button>Utility</button>

        <button>Report</button>

        <button>Admin</button>

    </nav>


    <!-- WELCOME SECTION -->

    <main class="main-section">

        <div class="welcome-card">

            <h2>Welcome to IDS Billing Software</h2>

            <p>
                Professional Billing Management System
            </p>

            <span>Version 1.0.0</span>

        </div>

    </main>



    <!-- FOOTER -->

    <footer>

        Developed By IDS

    </footer>



<script src="dashboard.js"></script>
</body>
</html>
