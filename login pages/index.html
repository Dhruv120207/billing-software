<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>billing software</title>
    
    <link rel="stylesheet" href="login.css">

</head>
<body>
        
    <div class="background"></div>
    
    <div class="login-card">
        
        <div class="logo">
        <h1>billing software</h1>

        <!--    <p>PRODUCT MANAGER</p> -->

        </div>
        <h2>Welcome Back</h2>
        <span class="subtitle">Please login to continue</span>

        <!-- USER ID -->

        <div class="input-box">
            <input type="text" id="userid" required>
            <label>User ID</label>
        </div>

        <!-- PASSWORD -->

        <div class="input-box password-box">
            <input type="password" id="password" required>
            <label>Password</label>
            <button type="button" class="show-btn" id="showPassword">
                Show
            </button>
        </div>

        <!-- CAPS LOCK -->

        <p id="capsWarning" class="warning">
            Caps Lock is ON
        </p>

        <!-- REMEMBER ME -->

        <div class="remember">
            <label>
                <input type="checkbox">
                Remember Me
            </label>
        </div>

        <!-- LOGIN -->

        <button class="login-btn" id="loginBtn">
            <span id="loginText">
                LOGIN
            </span>

            <span id="loading" class="hidden">
                Please Wait...
            </span>
        </button>

        <div class="version">
            Version 1.0.0
        </div>
    </div>

    <script src="login.js"></script>

</body>
</html>
